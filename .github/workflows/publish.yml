name: Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag of the release to publish (e.g. v1.2.3 or 1.2.3).'
        required: true
        type: string
      dry_run:
        description: 'If true, runs npm publish --dry-run (no actual publish).'
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      tag:
        description: 'Git tag of the release to publish (e.g. v1.2.3 or 1.2.3).'
        required: true
        type: string
      dry_run:
        description: 'If true, runs npm publish --dry-run (no actual publish).'
        required: false
        type: boolean
        default: false
    secrets:
      NPM_TOKEN:
        description: 'NPM publish token'
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: github.repository == 'SecretX33/mcp-filter-proxy'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Sanitize tag
        id: sanitize
        uses: ./.github/actions/sanitize-version
        with:
          version: ${{ inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Download release asset
        run: gh release download "${{ steps.sanitize.outputs.tag }}" --pattern "*.tgz"

      - name: List downloaded files
        run: |
          echo "=== Working directory ==="
          pwd
          echo "=== All files in current directory ==="
          ls -la
          echo "=== TGZ files ==="
          ls -la *.tgz 2>/dev/null || echo "No .tgz files found!"

      - name: Publish to NPM
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          FLAGS="--access public --provenance"
          if [ "${{ inputs.dry_run }}" = "true" ]; then FLAGS="$FLAGS --dry-run"; fi
          npm publish mcp-filter-proxy-${{ steps.sanitize.outputs.version }}.tgz $FLAGS
